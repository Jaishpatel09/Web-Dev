<!DOCTYPE html>

<head>

    <title>Overflow</title>
    <style>
        .box{
            height: 100px;
            width: 150px;
            border: 2px solid red;
            border-radius: 5px;
            overflow: scroll;
            white-space: nowrap;
            text-overflow: ellipsis;

        }
    </style>
</head>
<body>
