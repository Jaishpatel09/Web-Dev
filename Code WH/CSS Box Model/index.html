<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aquamarine;
        }
        .box1{
            color: red;
            padding: 10px;
            margin: 25px;
            border: 2px solid rgb(217, 0, 255);
            height: 100px;
        }
        .box2{
            color: rgb(255, 0, 225);
            padding: 10px;
            margin: 20px;
            border: 2px solid rgb(217, 0, 255);
            height: 100px;
        }
    </style>   
</head>
<body>
    <div class="box box1">Good Morning</div>
    <div class="box box2">Good Afternoon</div>
</body>
</html>
