<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Sizing</title>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .box{
        box-sizing: border-box;
        border: 2px solid;
        background-color: aqua;
        width: 80vw;
        margin: auto;
    }
</style>
</head>
<body>
    <div class="box">
        This is a box
    </div>
</body>
</html>
