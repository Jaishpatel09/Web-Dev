<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style list using CSS</title>
    <style>
        nav ul li{
            list-style: none;
            list-style-type: "🤣";
            /* list-style-type:devanagari; */
            background-color: aqua;
            list-style-position: inside;
            border: 2px solid blue;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Contact Us</li>
        </ul>
    </nav>
</body>
</html>
