<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity</title>
    <style>
         h1{
            color: aqua;
        }
      
        /* #hello{
            color: blueviolet;
        } */
        .yellow{
            color: yellow;
        }
        /* important priority */
        .red{
            color: red !important;
        }
        .blue{
            color: blue;
        }
        /* Attribute Selector */
        [data-x=a]{
            background-color: aqua;
        }
         
    </style>
</head>
<body>
    <h1 id="hello" class="yellow red  blue" data-x="a">Congratulation..!</h1>
</body>
</html>
