<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: rgb(141, 202, 255);
            /* position: relative;
            z-index: 1; */
            position: absolute;
            top: 0px;
        }
        .box2{
            background-color: aqua;
            position: relative;
            top: -40px;
            left: 20px;
        }
        .box3{
            background-color: bisque;
        }
        .box4{
            background-color: blue;
        }
        .box{
            border: 2px solid red;
            height: 80px;
            width: 80vh;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        .parent{
            border: 2px solid red;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="parent">

        <div class="box box1">kya haal hai </div>
        <div class="box box2">sab changa si</div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
