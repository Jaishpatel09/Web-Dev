<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows Outline Property</title>
    <style>
        .box{
            border: solid;
            margin: 32px;
            padding: 20px;
            box-shadow: 5px 15px 5px cornflowerblue;
            text-shadow: 2px 2px 4px chocolate;
        }
        .box1{
            border: 2px dotted red;
            outline: 2px solid rgb(8, 0, 255);
        }

    </style>
</head>
<body>
    <div class="box">
        I am a Box
    </div>

    <div class="box1">Doosara Dabba</div>
</body>
</html>
