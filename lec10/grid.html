<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            height: 500px;
            width: 470px;
            border: 3px solid;
            display: grid;
            display: grid;
            grid-template-columns: 100px 100px;
            grid-template-rows: 100px 100px;
            gap: 10px;
        }
        .child{
            /* background-color: aqua; */
            border: 1px solid rgb(0, 0, 0);
        }
        #one{
            background-color: red;
        }
        #two{
            background-color: rgb(11, 248, 3);
        }
        #three{
            background-color: gold;
        }
        #four{
            background-color: rgb(255, 106, 0);
        }
        #five{
            background-color: rgb(68, 145, 112);
        }
        #six{
            background-color: rgb(255, 0, 217);
        }
        #seven{
            background-color: rgba(24, 19, 23, 0.411);
        }
        #eight{
            background-color: rgba(51, 2, 248, 0.411);
        }
        #nine{
            background-color: rgb(0, 217, 255);
        }
        #ten{
            background-color: rgb(89, 0, 255);
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="one">1</div>
        <div class="child" id="two">2</div>
        <div class="child" id="three">3</div>
        <div class="child" id="four">4</div>
        <div class="child" id="five">5</div>
        <div class="child" id="six">6</div>
        <div class="child" id="seven">7</div>
        <div class="child" id="eight">8</div>
        <div class="child" id="nine">9</div>
        <div class="child" id="ten">10</div>
    </div>
</body>
</html>
