<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            height: 500px;
            width: 470px;
            /* border: 3px solid; */
          
            display: grid;
            grid-template-columns: 150px 150px 150px;
            grid-template-rows: 100px 100px;
            gap: 10px;
            margin: auto;
        }
        .child{
           overflow: hidden;
            

        }
       
         
        .child img{
             height: 100%;
            width: 100%;
            background-size: cover;
            transition: transform 0.4s ease;
        }
        .child:hover img{
            transform: scale(1.2);
            filter: blur(1px);
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="one">
            <img src="https://images.unsplash.com/photo-1761839258803-21515f43190c?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
