<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
           #main{
            height: 400px;
            width: 300px;
            margin: 50px auto;
            transition: 3s;
            border-radius: 21px;
           box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
           }
           #card_a{
            height: 50%;
            width: 100%;
           }
           #card_b{
            height: 45%;
            width: 50%;
           }
           img{
            height: 100%;
            width: 100%;
          
           }
           #card_b img{
            border-radius: 50%;
            position: relative;
            top: -100px;
            left: 80px;
           }
           #main:hover{
            transform: scale(1.2);
            transform: rotate(360deg);
           }
    </style>
</head>
<body>
    <div id="main">
        <div id="card_a">   
            <img src="https://images.unsplash.com/photo-1768158984380-5071c359070f?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div id="card_b"> 
            <img src="https://images.unsplash.com/photo-1767982573352-5fae82982f2e?q=80&w=1976&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
    </div>
</body>
</html>
